<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0b14" />
    <meta
      name="description"
      content="Aura — low-latency haptic and audio spatial guidance for the visually impaired."
    />
    <title>Aura — Spatial Guidance</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#controls">Skip to controls</a>

    <main>
      <h1 class="visually-hidden">Aura spatial guidance</h1>

      <!-- Live camera preview. Hidden canvas is used for frame compression. -->
      <section class="viewport" aria-label="Camera view">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas" width="640" height="480" hidden></canvas>

        <!-- Visual targeting overlay (also useful for sighted helpers / demo). -->
        <div class="overlay" aria-hidden="true">
          <div class="deadzone"></div>
          <div id="reticle" class="reticle"></div>
        </div>

        <!-- Not a live region: this updates at the frame rate (~8Hz), which
             would flood screen readers. Spoken guidance is the a11y channel. -->
        <div id="status" class="status">
          Enter a target and press Start.
        </div>
      </section>

      <section id="controls" class="controls" aria-label="Controls">
        <label for="target" class="field-label">Target object</label>
        <div class="field-row">
          <input
            id="target"
            type="text"
            inputmode="text"
            autocomplete="off"
            placeholder="e.g. water bottle"
            aria-describedby="target-hint"
          />
          <button id="mic" class="btn btn-icon" type="button" aria-label="Speak target">
            🎤
          </button>
        </div>
        <p id="target-hint" class="hint">
          Type or speak the object you are looking for.
        </p>

        <button id="toggle" class="btn btn-primary" type="button" aria-pressed="false">
          Start guidance
        </button>

        <!-- Frame rate: how often a frame is sent for inference. Lower = fewer
             API calls = lower cost; higher = tighter tracking. -->
        <div class="slider-row">
          <label for="fps-range">
            Scan rate: <strong><span id="fps-target">8</span> fps</strong>
          </label>
          <input
            id="fps-range"
            type="range"
            min="1"
            max="10"
            step="1"
            value="8"
            aria-describedby="fps-hint"
          />
          <p id="fps-hint" class="hint">
            Lower rate = fewer inferences = lower cost.
          </p>
        </div>

        <div class="settings">
          <label class="switch">
            <input id="speech-toggle" type="checkbox" checked />
            <span>Voice guidance</span>
          </label>
          <label class="switch">
            <input id="haptics-toggle" type="checkbox" checked />
            <span>Haptics</span>
          </label>
          <label class="switch">
            <input id="slow-toggle" type="checkbox" />
            <span>Demo: simulate slow GPU</span>
          </label>
        </div>

        <div class="inline-row">
          <button id="vibe-test" class="btn btn-secondary" type="button">
            Test vibration
          </button>
          <label for="rate" class="rate-label">
            $/1M tokens
            <input id="rate" type="number" min="0" step="0.01" value="0.10" />
          </label>
        </div>
        <p id="vibe-status" class="hint" role="status" aria-live="polite"></p>

        <dl class="telemetry" aria-label="Telemetry">
          <div><dt>Latency</dt><dd><span id="latency">—</span> ms</dd></div>
          <div><dt>Rate</dt><dd><span id="fps">0</span> fps</dd></div>
          <div><dt>Engine</dt><dd><span id="mode">—</span></dd></div>
          <div><dt>Tokens</dt><dd><span id="tokens">0</span></dd></div>
          <div><dt>Est. cost</dt><dd>$<span id="cost">0.0000</span></dd></div>
        </dl>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
