name = "aura"
main = "src/index.js"
compatibility_date = "2025-06-28"

# Serve the PWA client from /public via Workers Assets. Static files are served
# first; only /api/* invokes the Worker (the Hono orchestration layer).
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# Non-secret config. CEREBRAS_API_KEY is a secret — set it with:
#   wrangler secret put CEREBRAS_API_KEY
# (or in the dashboard). Without it, the Worker runs in mock mode.
[vars]
CEREBRAS_BASE_URL = "https://api.cerebras.ai/v1/chat/completions"
CEREBRAS_MODEL = "gemma-4-31b"

[observability]
enabled = true
